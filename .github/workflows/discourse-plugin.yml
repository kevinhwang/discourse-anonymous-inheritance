name: Discourse Plugin

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/dependabot.yml
      - .gitignore
      - '*.md'

  pull_request:
    branches:
      - main
    paths-ignore:
      - .github/dependabot.yml
      - .gitignore
      - '*.md'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ci:
    uses: discourse/.github/.github/workflows/discourse-plugin.yml@v1
